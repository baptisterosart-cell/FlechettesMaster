<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DartScore Ultimate Pro v2</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #121824 0%, #080b11 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --active-bg: rgba(46, 204, 113, 0.15);
            --accent-green: #2ecc71;
            --accent-blue: #3498db;
            --accent-orange: #f39c12;
            --accent-red: #e74c3c;
            --text-main: #ffffff;
            --text-muted: #8a99ad;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 414px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* CONFIGURATION */
        .menu-screen { display: flex; flex-direction: column; gap: 20px; }
        .section-title { font-size: 14px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 8px; }
        
        .game-modes {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .mode-btn, .setup-btn {
            background: var(--card-bg);
            border: 2px solid transparent;
            color: white;
            padding: 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .mode-btn.selected {
            border-color: var(--accent-green);
            background: var(--active-bg);
            color: var(--accent-green);
        }

        .player-input-row {
            display: flex; gap: 10px; align-items: center;
            background: var(--card-bg); padding: 10px; border-radius: 10px; margin-bottom: 10px;
        }

        .player-input-row input {
            background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 8px; border-radius: 6px; flex: 1;
        }

        .btn-toggle-bot { background: #34495e; border: none; color: white; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .btn-toggle-bot.is-bot { background: #9b59b6; }
        .btn-remove { background: #e74c3c; border: none; color: white; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; }
        
        .btn-start {
            background: var(--accent-green); color: #121824; padding: 15px;
            border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        /* ZONE DE JEU */
        .game-screen { display: none; flex-direction: column; height: 100%; flex: 1; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .players-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        
        .player-card {
            background: var(--card-bg); border: 2px solid transparent;
            padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center;
        }

        .player-card.active { background: var(--active-bg); border-color: var(--accent-green); }
        .player-score { font-size: 24px; font-family: monospace; font-weight: bold; }
        .player-info-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

        /* TABLEAU CRICKET REVISITÉ */
        .cricket-table-container {
            background: rgba(0,0,0,0.2); border-radius: 12px; padding: 8px; margin-bottom: 15px; overflow-x: auto;
        }
        .cricket-table { width: 100%; border-collapse: collapse; text-align: center; font-size: 14px; }
        .cricket-table th { color: var(--text-muted); font-weight: normal; padding: 6px; font-size: 11px; text-transform: uppercase; }
        .cricket-table td { padding: 8px 4px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .cricket-target-cell { font-weight: bold; background: rgba(255,255,255,0.05); border-radius: 6px; color: var(--accent-blue); width: 40px; }
        .cricket-status-active { color: var(--accent-green); font-weight: bold; font-size: 16px; }

        .history-box {
            background: rgba(0, 0, 0, 0.3); border-radius: 12px;
            padding: 12px; height: 60px; overflow-y: auto; margin-bottom: 15px; font-size: 12px;
        }

        .keyboard-section { background: rgba(255, 255, 255, 0.02); border-radius: 20px; padding: 15px; margin-top: auto; }
        .preview-score { text-align: center; font-size: 28px; font-weight: bold; margin-bottom: 10px; color: #ffffff; }
        .grid-keyboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        
        .key { background: rgba(255, 255, 255, 0.08); border: none; color: white; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; }
        .key.clear { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }
        .key.ok { background: var(--accent-green); color: #121824; }

        /* Multiplicateurs */
        .cricket-modifiers {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px;
        }
        .mod-btn {
            background: rgba(255,255,255,0.08); border: 2px solid transparent; color: white;
            padding: 12px; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 13px;
        }
        .mod-btn.active {
            border-color: var(--accent-orange); background: rgba(243, 156, 18, 0.25); color: var(--accent-orange);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }

        .bot-thinking { display: none; text-align: center; padding: 30px; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- ================= ÉCRAN MENU ================= -->
    <div class="menu-screen" id="menu-screen">
        <h1 style="text-align: center; margin-bottom: 0;">🎯 DartScore Pro</h1>
        <p style="text-align: center; color: var(--text-muted); margin-top: 5px; font-size: 14px;">Sélectionne tes règles et lance-toi</p>
        
        <div>
            <div class="section-title">1. Mode de Jeu</div>
            <div class="game-modes">
                <button class="mode-btn selected" id="mode-301" onclick="selectMode('301')">301</button>
                <button class="mode-btn" id="mode-501" onclick="selectMode('501')">501</button>
                <button class="mode-btn" id="mode-cricket" onclick="selectMode('cricket')">Cricket</button>
                <button class="mode-btn" id="mode-halveit" onclick="selectMode('halveit')">Juste Cible</button>
                <button class="mode-btn" id="mode-around" onclick="selectMode('around')">Tour du Monde</button>
                <button class="mode-btn" id="mode-killer" onclick="selectMode('killer')">Le Tueur 🔪</button>
            </div>
        </div>

        <div>
            <div class="section-title">2. Joueurs &amp; Bots</div>
            <div id="players-setup-list"></div>
            <button class="setup-btn" style="width:100%; background: rgba(255,255,255,0.1);" onclick="addPlayerSetupRow()">+ Ajouter un joueur</button>
        </div>

        <button class="btn-start" onclick="startGame()">LANCER LA PARTIE 🚀</button>
    </div>

    <!-- ================= ÉCRAN JEU ================= -->
    <div class="game-screen" id="game-screen">
        <header>
            <h2 id="game-title-display" style="margin:0; font-size: 20px;">Mode</h2>
            <button class="key clear" style="padding: 5px 12px; font-size: 12px; font-weight: normal;" onclick="quitterPartie()">Quitter</button>
        </header>

        <!-- Liste des joueurs standard -->
        <div class="players-list" id="players-game-container"></div>
        
        <!-- Conteneur dynamique pour le tableau de Cricket -->
        <div id="cricket-table-wrapper"></div>

        <div class="history-box" id="history-container"></div>

        <div class="keyboard-section" id="keyboard-wrapper">
            <!-- Zone des modificateurs (Cricket et Tueur) -->
            <div class="cricket-modifiers" id="cricket-modifiers-zone" style="display: none;">
                <button class="mod-btn active" id="mod-1" onclick="setCricketMultiplier(1)">Simple (x1)</button>
                <button class="mod-btn" id="mod-2" onclick="setCricketMultiplier(2)">Double (x2)</button>
                <button class="mod-btn" id="mod-3" onclick="setCricketMultiplier(3)">Triple (x3)</button>
            </div>

            <div class="preview-score" id="preview-display">Veuillez jouer</div>
            <div class="grid-keyboard" id="keyboard-grid"></div>
        </div>

        <div class="bot-thinking" id="bot-status">
            🤖 Le Bot réfléchit...
        </div>
    </div>

</div>

<script>
    let selectedGameMode = '301';
    let players = [];
    let currentPlayerIndex = 0;
    let currentInput = "";
    let isGameOver = false;
    let cricketMultiplier = 1; 

    const halveItTargets = [15, 16, "Double", 17, 18, "Triple", 19, 20, "Bulle"];

    let setupPlayers = [
        { name: "Joueur 1", isBot: false },
        { name: "DartyBot 🤖", isBot: true }
    ];

    function renderSetup() {
        const container = document.getElementById('players-setup-list');
        container.innerHTML = '';
        setupPlayers.forEach((p, idx) => {
            container.innerHTML += `
                <div class="player-input-row">
                    <input type="text" value="${p.name}" onchange="updateSetupName(${idx}, this.value)">
                    <button class="btn-toggle-bot ${p.isBot ? 'is-bot' : ''}" onclick="toggleSetupBot(${idx})">
                        ${p.isBot ? '🤖 Bot' : '👤 Humain'}
                    </button>
                    ${setupPlayers.length > 1 ? `<button class="btn-remove" onclick="removeSetupPlayer(${idx})">×</button>` : ''}
                </div>
            `;
        });
    }

    function selectMode(mode) {
        selectedGameMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
        document.getElementById(`mode-${mode}`).classList.add('selected');
    }

    function addPlayerSetupRow() {
        setupPlayers.push({ name: `Joueur ${setupPlayers.length + 1}`, isBot: false });
        renderSetup();
    }

    function removeSetupPlayer(idx) { setupPlayers.splice(idx, 1); renderSetup(); }
    function updateSetupName(idx, val) { setupPlayers[idx].name = val; }
    
    function toggleSetupBot(idx) {
        setupPlayers[idx].isBot = !setupPlayers[idx].isBot;
        if(setupPlayers[idx].isBot && setupPlayers[idx].name.startsWith('Joueur')) {
            setupPlayers[idx].name = "DartyBot 🤖";
        }
        renderSetup();
    }

    function startGame() {
        players = setupPlayers.map(p => {
            if (selectedGameMode === 'cricket') {
                return { name: p.name, isBot: p.isBot, cricketStats: {20:0, 19:0, 18:0, 17:0, 16:0, 15:0, 25:0} };
            } else if (selectedGameMode === 'halveit') {
                return { name: p.name, isBot: p.isBot, score: 40, currentRoundIdx: 0 };
            } else if (selectedGameMode === 'around') {
                return { name: p.name, isBot: p.isBot, score: 1 };
            } else if (selectedGameMode === 'killer') {
                // Tueur : score = nombre de vies (on commence à 3), targetNo = numéro de maison attribué (-1 si aucun)
                return { name: p.name, isBot: p.isBot, score: 3, targetNo: -1, isKiller: false, mort: false };
            } else {
                return { name: p.name, isBot: p.isBot, score: parseInt(selectedGameMode) };
            }
        });

        currentPlayerIndex = 0;
        currentInput = "";
        isGameOver = false;
        cricketMultiplier = 1;

        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        
        let titleMap = {'301':'301', '501':'501', 'cricket':'Cricket', 'halveit':'Juste Cible', 'around':'Tour du Monde', 'killer':'Le Tueur 🔪'};
        document.getElementById('game-title-display').innerText = titleMap[selectedGameMode];
        document.getElementById('history-container').innerHTML = `<div class="history-entry">🏁 La partie commence !</div>`;
        
        buildKeyboard();
        updateGameUI();
    }

    function quitterPartie() {
        if(confirm("Quitter et revenir au menu principal ?")) {
            document.getElementById('menu-screen').style.display = 'flex';
            document.getElementById('game-screen').style.display = 'none';
        }
    }

    function setCricketMultiplier(mult) {
        cricketMultiplier = mult;
        document.querySelectorAll('.mod-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`mod-${mult}`).classList.add('active');
        
        let label = mult === 3 ? "🎯 Prochain clic : TRIPLE !" : (mult === 2 ? "🎯 Prochain clic : DOUBLE !" : "Prochain clic : Simple");
        document.getElementById('preview-display').innerText = label;
    }

    function buildKeyboard() {
        const grid = document.getElementById('keyboard-grid');
        const preview = document.getElementById('preview-display');
        const modZone = document.getElementById('cricket-modifiers-zone');
        
        if (selectedGameMode === 'cricket') {
            modZone.style.display = 'grid';
            grid.innerHTML = `
                <button class="key" onclick="pressCricket(20)">20</button><button class="key" onclick="pressCricket(19)">19</button><button class="key" onclick="pressCricket(18)">18</button>
                <button class="key" onclick="pressCricket(17)">17</button><button class="key" onclick="pressCricket(16)">16</button><button class="key" onclick="pressCricket(15)">15</button>
                <button class="key" style="grid-column: span 2" onclick="pressCricket(25)">Bulle 🎯</button>
                <button class="key clear" onclick="pressCricket(0)">Manqué ⭕</button>
            `;
            preview.innerText = "Sélectionnez d'abord le multiplicateur ci-dessus !";
        } else if (selectedGameMode === 'killer') {
            modZone.style.display = 'grid'; // Sert aussi au Tueur pour devenir tueur via le double
            grid.innerHTML = `
                <button class="key" onclick="pressKillerKey(1)">1</button><button class="key" onclick="pressKillerKey(2)">2</button><button class="key" onclick="pressKillerKey(3)">3</button>
                <button class="key" onclick="pressKillerKey(4)">4</button><button class="key" onclick="pressKillerKey(5)">5</button><button class="key" onclick="pressKillerKey(6)">6</button>
                <button class="key" onclick="pressKillerKey(7)">7</button><button class="key" onclick="pressKillerKey(8)">8</button><button class="key" onclick="pressKillerKey(9)">9</button>
                <button class="key" onclick="pressKillerKey(10)">10</button><button class="key" onclick="pressKillerKey(11)">11</button><button class="key" onclick="pressKillerKey(12)">12</button>
                <button class="key" onclick="pressKillerKey(13)">13</button><button class="key" onclick="pressKillerKey(14)">14</button><button class="key" onclick="pressKillerKey(15)">15</button>
                <button class="key" onclick="pressKillerKey(16)">16</button><button class="key" onclick="pressKillerKey(17)/">17</button><button class="key" onclick="pressKillerKey(18)">18</button>
                <button class="key" onclick="pressKillerKey(19)">19</button><button class="key" onclick="pressKillerKey(20)">20</button><button class="key" onclick="pressKillerKey(25)">Bulle</button>
                <button class="key clear" style="grid-column: span 3;" onclick="pressKillerKey(0)">Manqué ⭕</button>
            `;
            preview.innerText = "Sélectionnez votre impact";
        } else if (selectedGameMode === 'around') {
            modZone.style.display = 'none';
            grid.innerHTML = `
                <button class="key clear" style="grid-column: span 1" onclick="executeAroundTurn(false)">Manqué ⭕</button>
                <button class="key ok" style="grid-column: span 2" onclick="executeAroundTurn(true)">Touché ! 🎯</button>
            `;
            preview.innerText = "Lancer de 3 fléchettes";
        } else {
            modZone.style.display = 'none';
            grid.innerHTML = `
                <button class="key" onclick="pressNum(1)">1</button><button class="key" onclick="pressNum(2)">2</button><button class="key" onclick="pressNum(3)">3</button>
                <button class="key" onclick="pressNum(4)">4</button><button class="key" onclick="pressNum(5)">5</button><button class="key" onclick="pressNum(6)">6</button>
                <button class="key" onclick="pressNum(7)">7</button><button class="key" onclick="pressNum(8)">8</button><button class="key" onclick="pressNum(9)">9</button>
                <button class="key clear" onclick="pressClear()">Effacer</button><button class="key" onclick="pressNum(0)">0</button><button class="key ok" onclick="pressOK()">OK</button>
            `;
            preview.innerText = "0";
        }
    }

    function updateGameUI() {
        const listContainer = document.getElementById('players-game-container');
        const tableWrapper = document.getElementById('cricket-table-wrapper');
        
        listContainer.innerHTML = '';
        tableWrapper.innerHTML = '';

        if (selectedGameMode === 'cricket') {
            listContainer.style.display = 'none';
            let targets = [20, 19, 18, 17, 16, 15, 25];
            let tableHTML = `<div class="cricket-table-container"><table class="cricket-table"><thead><tr><th>Cible</th>`;
            
            players.forEach((p, index) => {
                let isCurrent = index === currentPlayerIndex ? 'style="color:var(--accent-green); font-weight:bold;"' : '';
                tableHTML += `<th ${isCurrent}>${p.name}</th>`;
            });
            tableHTML += `</tr></thead><tbody>`;

            targets.forEach(t => {
                tableHTML += `<tr><td class="cricket-target-cell">${t === 25 ? 'Bulle' : t}</td>`;
                players.forEach(p => {
                    let count = p.cricketStats[t];
                    let symbol = "·";
                    if(count === 1) symbol = "╱";
                    if(count === 2) symbol = "X";
                    if(count >= 3) symbol = "⨂";
                    tableHTML += `<td class="cricket-status-active">${symbol}</td>`;
                });
                tableHTML += `</tr>`;
            });
            tableHTML += `</tbody></table></div>`;
            tableWrapper.innerHTML = tableHTML;

        } else {
            listContainer.style.display = 'flex';
            players.forEach((player, index) => {
                const isActive = index === currentPlayerIndex ? 'active' : '';
                let subText = player.isBot ? "Robot" : "Joueur";
                let mainScore = player.score;

                if (selectedGameMode === 'halveit') {
                    let currentTarget = halveItTargets[player.currentRoundIdx] || "Fini";
                    subText = `Objectif du tour : <b>${currentTarget}</b>`;
                } else if (selectedGameMode === 'around') {
                    subText = player.score > 20 ? "Objectif : <b>Bulle</b>" : `Cherche le numéro : <b>${player.score}</b>`;
                    mainScore = player.score > 21 ? "Gagné !" : `#${player.score}`;
                } else if (selectedGameMode === 'killer') {
                    if (player.mort) {
                        subText = "❌ ÉLIMINÉ";
                        mainScore = "MORT";
                    } else if (!player.isKiller) {
                        subText = player.targetNo === -1 ? "Attribuer un numéro" : `Maison : <b>${player.targetNo}</b> (Vise le Double)`;
                        mainScore = `${player.score} ❤`;
                    } else {
                        subText = `🔪 <b>TUEUR</b> (Maison : ${player.targetNo})`;
                        mainScore = `${player.score} ❤`;
                    }
                }

                listContainer.innerHTML += `
                    <div class="player-card ${isActive}" style="${player.mort ? 'opacity: 0.4;' : ''}">
                        <div>
                            <div style="font-weight:bold;">${player.name}</div>
                            <div class="player-info-sub">${subText}</div>
                        </div>
                        <div class="player-score" style="color: ${selectedGameMode === 'killer' && player.isKiller ? 'var(--accent-red)' : ''}">${mainScore}</div>
                    </div>
                `;
            });
        }

        if (players[currentPlayerIndex].isBot && !isGameOver) {
            document.getElementById('keyboard-wrapper').style.display = 'none';
            document.getElementById('bot-status').style.display = 'block';
            runBotTurn();
        } else {
            document.getElementById('keyboard-wrapper').style.display = 'block';
            document.getElementById('bot-status').style.display = 'none';
        }
    }

    function pressNum(num) {
        if (currentInput.length < 3) {
            currentInput += num;
            document.getElementById('preview-display').innerText = currentInput + (selectedGameMode==='halveit'?' pts':'');
        }
    }
    function pressClear() { currentInput = ""; document.getElementById('preview-display').innerText = "0"; }

    // X01
    function pressOK() {
        const points = parseInt(currentInput) || 0;
        if (points > 180) { alert("Max 180 !"); return; }
        let player = players[currentPlayerIndex];
        let newScore = player.score - points;
        const history = document.getElementById('history-container');

        if (newScore === 0) {
            player.score = 0; isGameOver = true; updateGameUI();
            alert(`🎉 Victoire de ${player.name} !`); return;
        } else if (newScore < 0) {
            history.insertAdjacentHTML('afterbegin', `<div>💥 ${player.name} BUST (${points} pts)</div>`);
        } else {
            player.score = newScore;
            history.insertAdjacentHTML('afterbegin', `<div>🎯 ${player.name} : -${points} (Reste : ${newScore})</div>`);
        }
        pressClear(); nextPlayer();
    }

    // CRICKET
    function pressCricket(target) {
        if(isGameOver) return;
        let player = players[currentPlayerIndex];
        const history = document.getElementById('history-container');

        if(target === 0) {
            history.insertAdjacentHTML('afterbegin', `<div>⭕ ${player.name} a manqué son tour</div>`);
            setCricketMultiplier(1); nextPlayer(); return;
        }

        if (target === 25 && cricketMultiplier === 3) cricketMultiplier = 2; 

        let label = cricketMultiplier === 3 ? "Triple" : (cricketMultiplier === 2 ? "Double" : "Simple");
        let addedHits = cricketMultiplier;

        if(player.cricketStats[target] < 3) {
            player.cricketStats[target] = Math.min(3, player.cricketStats[target] + addedHits);
            history.insertAdjacentHTML('afterbegin', `<div>🎯 ${player.name} valide un <b>${label} ${target === 25 ? 'Bulle' : target}</b> !</div>`);
            
            let win = true;
            for(let t in player.cricketStats) { if(player.cricketStats[t] < 3) win = false; }
            if(win) {
                isGameOver = true; updateGameUI();
                alert(`🎉 Victoire au Cricket de ${player.name} !`); return;
            }
        } else {
            history.insertAdjacentHTML('afterbegin', `<div>🔒 ${target} déjà fermé pour ${player.name}</div>`);
        }

        setCricketMultiplier(1);
        updateGameUI(); nextPlayer();
    }

    // TOUR DU MONDE
    function executeAroundTurn(hit) {
        let player = players[currentPlayerIndex];
        const history = document.getElementById('history-container');

        if (hit) {
            player.score++;
            history.insertAdjacentHTML('afterbegin', `<div>✅ ${player.name} valide l'étape !</div>`);
            if (player.score > 21) {
                isGameOver = true; updateGameUI();
                alert(`🎉 ${player.name} a fini le Tour du Monde !`); return;
            }
        } else {
            history.insertAdjacentHTML('afterbegin', `<div>⭕ ${player.name} a raté ce tour</div>`);
        }
        nextPlayer();
    }

    // JUSTE CIBLE
    function pressHalveIt() {
        const points = parseInt(currentInput) || 0;
        let player = players[currentPlayerIndex];
        const history = document.getElementById('history-container');
        let targetText = halveItTargets[player.currentRoundIdx];

        if (points > 0) {
            player.score += points;
            history.insertAdjacentHTML('afterbegin', `<div>🎯 ${player.name} validé (+${points} pts) sur ${targetText}</div>`);
        } else {
            player.score = Math.round(player.score / 2);
            history.insertAdjacentHTML('afterbegin', `<div>💥 ${player.name} raté sur ${targetText} ! Score divisé par 2</div>`);
        }

        player.currentRoundIdx++;
        
        if (player.currentRoundIdx >= halveItTargets.length) {
            if(currentPlayerIndex === players.length - 1) {
                isGameOver = true;
                let winner = players.reduce((max, p) => p.score > max.score ? p : max, players[0]);
                updateGameUI();
                alert(`🏆 Fin du Juste Cible ! Le vainqueur est ${winner.name} avec ${winner.score} pts !`);
                return;
            }
        }
        pressClear(); nextPlayer();
    }

    // MINI JEU EXTRA : LE TUEUR (KILLER)
    function pressKillerKey(target) {
        if (isGameOver) return;
        let player = players[currentPlayerIndex];
        const history = document.getElementById('history-container');

        if (target === 0) {
            history.insertAdjacentHTML('afterbegin', `<div>⭕ ${player.name} a manqué son lancer.</div>`);
            setCricketMultiplier(1); nextPlayer(); return;
        }

        // Étape 1 : Attribuer un numéro de maison
        if (player.targetNo === -1) {
            // Vérifier si le numéro est déjà pris
            let dejaPris = players.some(p => p.targetNo === target);
            if (dejaPris) {
                alert("Ce numéro est déjà attribué à un autre joueur, choisis-en un autre !");
                return;
            }
            player.targetNo = target;
            history.insertAdjacentHTML('afterbegin', `<div>🏠 ${player.name} s'installe sur le numéro <b>${target}</b></div>`);
        } 
        // Étape 2 : Devenir Tueur (Nécessite de toucher son propre DOUBLE)
        else if (!player.isKiller) {
            if (target === player.targetNo && cricketMultiplier === 2) {
                player.isKiller = true;
                history.insertAdjacentHTML('afterbegin', `<div>🔪 <b>⚠️ ${player.name} EST DEVENU UN TUEUR !</b></div>`);
            } else {
                history.insertAdjacentHTML('afterbegin', `<div>🎯 ${player.name} touche le ${target} (Pas le double requis)</div>`);
            }
        } 
        // Étape 3 : Mode Tueur actif (Peut chasser les autres ou perdre sa propre vie par erreur)
        else {
            let victime = players.find(p => p.targetNo === target && !p.mort);
            if (victime) {
                let degats = cricketMultiplier; // Simple = 1 vie, Double = 2 vies, Triple = 3 vies
                victime.score -= degats;
                history.insertAdjacentHTML('afterbegin', `<div>⚔️ ${player.name} inflige -${degats} vie(s) à <b>${victime.name}</b> !</div>`);
                
                if (victime.score <= 0) {
                    victime.score = 0; victime.mort = true;
                    history.insertAdjacentHTML('afterbegin', `<div>💀 <b>${victime.name} est éliminé !</b></div>`);
                }
                
                // Vérification de fin de partie (Reste-t-il un seul survivant ?)
                let survivants = players.filter(p => !p.mort);
                if (survivants.length === 1) {
                    isGameOver = true; updateGameUI();
                    alert(`🏆 Victoire Sanglante ! ${survivants[0].name} a éliminé tout le monde !`); return;
                }
            } else {
                history.insertAdjacentHTML('afterbegin', `<div>🎯 ${player.name} tire dans le vide sur le ${target}</div>`);
            }
        }

        setCricketMultiplier(1);
        updateGameUI(); nextPlayer();
    }

    function nextPlayer() {
        if (!isGameOver) {
            do {
                currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
            } while (players[currentPlayerIndex].mort && !isGameOver); // Passe les joueurs morts
            updateGameUI();
        }
    }

    // BOT LOGIC
    function runBotTurn() {
        setTimeout(() => {
            if(isGameOver) return;
            let bot = players[currentPlayerIndex];
            
            if (selectedGameMode === 'cricket') {
                let targets = [20, 19, 18, 17, 16, 15, 25];
                let shot = 0;
                for(let t of targets) {
                    if(bot.cricketStats[t] < 3) { 
                        if (Math.random() > 0.45) {
                            shot = t;
                            let randMult = Math.random();
                            if (shot !== 25 && randMult > 0.85) cricketMultiplier = 3;
                            else if (randMult > 0.65) cricketMultiplier = 2;
                            else cricketMultiplier = 1;
                        } else { shot = 0; }
                        break; 
                    }
                }
                pressCricket(shot);
            } else if (selectedGameMode === 'killer') {
                // Choix de tir pour le Bot Tueur
                if (bot.targetNo === -1) {
                    // Cherche un numéro libre
                    let dispo = [20,19,18,17,16,15,14,13,12,11,10];
                    let choisi = dispo.find(n => !players.some(p => p.targetNo === n));
                    pressKillerKey(choisi || 5);
                } else if (!bot.isKiller) {
                    // Cherche son double
                    if(Math.random() > 0.5) { cricketMultiplier = 2; pressKillerKey(bot.targetNo); }
                    else { pressKillerKey(0); }
                } else {
                    // Chasse un joueur humain vivant
                    let proie = players.find(p => !p.isBot && !p.mort);
                    if (proie && Math.random() > 0.4) {
                        if (Math.random() > 0.8) cricketMultiplier = 2;
                        pressKillerKey(proie.targetNo);
                    } else { pressKillerKey(0); }
                }
            } else if (selectedGameMode === 'around') {
                executeAroundTurn(Math.random() > 0.5);
            } else if (selectedGameMode === 'halveit') {
                let hitSuccess = Math.random() > 0.35;
                let scoreSimulated = hitSuccess ? (Math.floor(Math.random() * 3) + 1) * parseInt(halveItTargets[bot.currentRoundIdx]) || 20 : 0;
                currentInput = scoreSimulated.toString(); pressHalveIt();
            } else {
                let botPoints = Math.floor(Math.random() * 35) + 15;
                if (botPoints > bot.score) botPoints = bot.score;
                currentInput = botPoints.toString(); pressOK();
            }
        }, 1400);
    }

    renderSetup();
</script>
</body>
